# Trust score v0 — defaults until governance stores parameters on-chain / DB.

trust:
  # New wallets / first cycle default trust (multiplier in voting_points)
  default_trust: 1.0
  trust_floor: 0.1
  trust_ceiling: 3.0
  # Number of past cycles contributing to rolling score
  rolling_window_cycles: 6
  # Benchmark label for documentation and logs (implement one in code)
  # Examples: "60_40_weth_usdc", "equal_weight_allowlist"
  benchmark_id: equal_weight_allowlist
  # How to map cycle return to trust delta (implement in code — stub enum)
  # - relative_to_benchmark: CSV vote_return_bps vs benchmark_return_bps (+5% / -5% step)
  # - time_weighted_portfolio_return: CSV vote_return_bps = effective decimal gain × 10000
  #   (portfolio basket return × remaining-cycle fraction); trust *= 1 + linear_scale * (bps/10000)
  update_rule: time_weighted_portfolio_return
  portfolio_trust:
    linear_scale: 1.0
