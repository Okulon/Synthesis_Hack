name: contracts

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/foundry.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/foundry.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge build
      - run: forge test
